<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Servicios - Sistema de Bodega</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="logo-hm-servicios.png" type="image/png">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <img src="logo-hm-servicios.png" alt="HM Servicios Logo" class="logo">
        <h2>HM Servicios</h2>
        <p class="subtitle">Sistema de Bodega</p>
      </div>
      <nav id="main-nav">
        <button class="nav-btn active" data-module="inventory">
          <span class="nav-icon">📦</span>
          <span>Inventario</span>
        </button>
        <button class="nav-btn" data-module="recipients">
          <span class="nav-icon">📧</span>
          <span>Destinatarios</span>
        </button>
        <button class="nav-btn" data-module="users">
          <span class="nav-icon">👥</span>
          <span>Usuarios</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <p>© 2026 HM Servicios</p>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <header id="content-header">
        <h1 id="module-title">Inventario</h1>
        <button id="btn-add" class="btn btn-primary">
          <span>+</span> Agregar
        </button>
      </header>
      <section id="module-content">
        <!-- Dynamic content loaded by JS -->
      </section>
    </main>
  </div>

  <!-- Modal Backdrop -->
  <div id="modal-backdrop" class="modal-backdrop hidden"></div>
  
  <!-- Generic Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-header">
      <h2 id="modal-title">Título</h2>
      <button id="modal-close" class="modal-close">&times;</button>
    </div>
    <div id="modal-body" class="modal-body">
      <!-- Dynamic form content -->
    </div>
  </div>

  <!-- Detail Modal (for product detail view) -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-header">
      <h2 id="detail-title">Detalle del Producto</h2>
      <button id="detail-close" class="modal-close">&times;</button>
    </div>
    <div id="detail-body" class="modal-body">
      <!-- Product detail content -->
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/data.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/recipients.js"></script>
  <script src="js/users.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
