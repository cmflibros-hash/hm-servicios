<![CDATA[<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HM Servicios - Sistema de Bodega</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="logo-hm-servicios.png" type="image/png">
</head>
<body>
  <div id="app">
    <!-- Top Header Bar -->
    <header id="top-header">
      <div class="header-left">
        <img src="logo-hm-servicios.png" alt="HM Servicios Logo" class="header-logo">
        <div class="header-brand">
          <h1>HM Servicios</h1>
          <span class="header-subtitle">Sistema de Gestión de Bodega</span>
        </div>
      </div>
      <div class="header-right">
        <button id="btn-settings" class="header-btn" title="Configuración">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        </button>
        <button id="btn-logout" class="header-btn" title="Cerrar Sesión">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span class="logout-text">Salir</span>
        </button>
      </div>
    </header>

    <div class="app-body">
      <!-- Sidebar -->
      <aside id="sidebar">
        <nav id="main-nav">
          <button class="nav-btn active" data-module="inventory">
            <span class="nav-icon">📦</span>
            <span>Inventario</span>
          </button>
          <button class="nav-btn" data-module="recipients">
            <span class="nav-icon">📧</span>
            <span>Destinatarios</span>
          </button>
          <button class="nav-btn" data-module="users">
            <span class="nav-icon">👥</span>
            <span>Usuarios</span>
          </button>
        </nav>
        <div class="sidebar-footer">
          <p>© 2026 HM Servicios</p>
        </div>
      </aside>

      <!-- Main Content -->
      <main id="main-content">
        <header id="content-header">
          <h1 id="module-title">Inventario</h1>
          <button id="btn-add" class="btn btn-primary">
            <span>+</span> Agregar
          </button>
        </header>
        <section id="module-content">
          <!-- Dynamic content loaded by JS -->
        </section>
      </main>
    </div>
  </div>

  <!-- Modal Backdrop -->
  <div id="modal-backdrop" class="modal-backdrop hidden"></div>
  
  <!-- Generic Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-header">
      <h2 id="modal-title">Título</h2>
      <button id="modal-close" class="modal-close">&times;</button>
    </div>
    <div id="modal-body" class="modal-body">
      <!-- Dynamic form content -->
    </div>
  </div>

  <!-- Detail Modal (for product detail view) -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-header">
      <h2 id="detail-title">Detalle del Producto</h2>
      <button id="detail-close" class="modal-close">&times;</button>
    </div>
    <div id="detail-body" class="modal-body">
      <!-- Product detail content -->
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/recipients.js"></script>
  <script src="js/users.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
]]>
